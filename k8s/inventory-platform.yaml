apiVersion: v1
kind: Service
metadata: { name: api-gateway, namespace: inventory-system }
spec: { selector: { app: api-gateway }, ports: [{ port: 3000, targetPort: 3000 }] }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: api-gateway-hpa, namespace: inventory-system }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: api-gateway }
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: frontend, namespace: inventory-system }
spec:
  replicas: 2
  selector: { matchLabels: { app: frontend } }
  template:
    metadata: { labels: { app: frontend } }
    spec:
      containers:
        - name: frontend
          image: inventory/frontend:1.0.0
          ports: [{ containerPort: 5173 }]
          env:
            - { name: VITE_API_URL, value: https://inventory.example.com/api }
          readinessProbe:
            { httpGet: { path: /, port: 5173 }, initialDelaySeconds: 10, periodSeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
---
apiVersion: v1
kind: Service
metadata: { name: frontend, namespace: inventory-system }
spec: { selector: { app: frontend }, ports: [{ port: 5173, targetPort: 5173 }] }
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: inventory-ingress
  namespace: inventory-system
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
spec:
  ingressClassName: nginx
  rules:
    - host: inventory.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend: { service: { name: api-gateway, port: { number: 3000 } } }
          - path: /
            pathType: Prefix
            backend: { service: { name: frontend, port: { number: 5173 } } }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: order-service-hpa, namespace: inventory-system }
