apiVersion: apps/v1
kind: Deployment
metadata: { name: api-gateway, namespace: inventory-system }
spec:
  replicas: 2
  selector: { matchLabels: { app: api-gateway } }
  template:
    metadata: { labels: { app: api-gateway } }
    spec:
      containers:
        - name: api-gateway
          image: inventory/api-gateway:1.0.0
          ports: [{ containerPort: 3000 }]
          envFrom:
            - configMapRef: { name: inventory-config }
          readinessProbe:
            { httpGet: { path: /health, port: 3000 }, initialDelaySeconds: 10, periodSeconds: 5 }
          livenessProbe:
            { httpGet: { path: /health, port: 3000 }, initialDelaySeconds: 20, periodSeconds: 10 }
          resources:
            requests: { cpu: 150m, memory: 128Mi }
            limits: { cpu: 1000m, memory: 512Mi }
---
apiVersion: v1
kind: Service
metadata: { name: event-bus-service, namespace: inventory-system }
spec: { selector: { app: event-bus-service }, ports: [{ port: 3005, targetPort: 3005 }] }
---
apiVersion: v1
