apiVersion: v1
kind: Namespace
metadata:
  name: inventory-system
---
apiVersion: v1
kind: Secret
metadata:
  name: inventory-secrets
  namespace: inventory-system
type: Opaque
stringData:
  JWT_SECRET: replace-with-production-jwt-secret
  INTERNAL_EVENT_TOKEN: replace-with-production-event-token
  POSTGRES_PASSWORD: inventory
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: inventory-system
data:
  init.sql: |
    CREATE DATABASE auth_db OWNER inventory;
    CREATE DATABASE inventory_db OWNER inventory;
    CREATE DATABASE order_db OWNER inventory;
    CREATE DATABASE reporting_db OWNER inventory;
    CREATE DATABASE event_bus_db OWNER inventory;
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: inventory-config
  namespace: inventory-system
data:
  CORS_ORIGIN: https://inventory.example.com
  AUTH_SERVICE_URL: http://auth-service:3001
  INVENTORY_SERVICE_URL: http://inventory-service:3002
  ORDER_SERVICE_URL: http://order-service:3003
  REPORTING_SERVICE_URL: http://reporting-service:3004
  EVENT_BUS_URL: http://event-bus-service:3005
  REDIS_URL: redis://redis:6379
  EVENT_TRANSPORT: http
  KAFKA_BROKERS: ''
  KAFKA_EVENTS_TOPIC: inventory.domain-events
  SEARCH_BACKEND: postgres
  OPENSEARCH_URL: http://opensearch:9200
  PRODUCT_SEARCH_INDEX: inventory-products
  PAYMENT_SIMULATION_MODE: success
  ALLOW_PUBLIC_ADMIN_REGISTRATION: 'false'
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: inventory-system
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports: [{ containerPort: 5432 }]
          env:
            - { name: POSTGRES_USER, value: inventory }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: inventory-secrets, key: POSTGRES_PASSWORD } }
            - { name: POSTGRES_DB, value: inventory_bootstrap }
          readinessProbe:
            exec: { command: ['pg_isready', '-U', 'inventory', '-d', 'inventory_bootstrap'] }
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - { name: postgres-data, mountPath: /var/lib/postgresql/data }
            - { name: postgres-init, mountPath: /docker-entrypoint-initdb.d }
      volumes:
        - name: postgres-init
          configMap: { name: postgres-init }
  volumeClaimTemplates:
    - metadata: { name: postgres-data }
      spec:
        accessModes: ['ReadWriteOnce']
        resources: { requests: { storage: 10Gi } }
---
apiVersion: v1
kind: Service
metadata: { name: postgres, namespace: inventory-system }
spec:
  selector: { app: postgres }
  ports: [{ port: 5432, targetPort: 5432 }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: redis, namespace: inventory-system }
spec:
  replicas: 1
  selector: { matchLabels: { app: redis } }
  template:
    metadata: { labels: { app: redis } }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports: [{ containerPort: 6379 }]
          readinessProbe:
            exec: { command: ['redis-cli', 'ping'] }
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 250m, memory: 256Mi }
---
apiVersion: v1
kind: Service
metadata: { name: redis, namespace: inventory-system }
spec: { selector: { app: redis }, ports: [{ port: 6379, targetPort: 6379 }] }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: event-bus-service, namespace: inventory-system }
spec:
  replicas: 2
  selector: { matchLabels: { app: event-bus-service } }
  template:
    metadata: { labels: { app: event-bus-service } }
    spec:
      containers:
        - name: event-bus-service
          image: inventory/event-bus-service:1.0.0
          ports: [{ containerPort: 3005 }]
          envFrom:
            - configMapRef: { name: inventory-config }
            - secretRef: { name: inventory-secrets }
          env:
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: inventory-secrets, key: POSTGRES_PASSWORD } }
            - name: EVENT_STORE_DATABASE_URL
              value: 'postgresql://inventory:$(POSTGRES_PASSWORD)@postgres:5432/event_bus_db?schema=public'
          readinessProbe:
            { httpGet: { path: /health, port: 3005 }, initialDelaySeconds: 10, periodSeconds: 5 }
          livenessProbe:
            { httpGet: { path: /health, port: 3005 }, initialDelaySeconds: 20, periodSeconds: 10 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: auth-service, namespace: inventory-system }
spec:
  replicas: 2
  selector: { matchLabels: { app: auth-service } }
  template:
    metadata: { labels: { app: auth-service } }
    spec:
      containers:
        - name: auth-service
          image: inventory/auth-service:1.0.0
          command: ['sh', '-c']
          args:
            - npm run prisma:migrate -w @inventory/auth-service && npm run seed -w @inventory/auth-service && npm run start -w @inventory/auth-service
          ports: [{ containerPort: 3001 }]
          envFrom:
            - configMapRef: { name: inventory-config }
            - secretRef: { name: inventory-secrets }
          env:
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: inventory-secrets, key: POSTGRES_PASSWORD } }
            - name: AUTH_DATABASE_URL
              value: 'postgresql://inventory:$(POSTGRES_PASSWORD)@postgres:5432/auth_db?schema=public'
            - name: AUTH_DIRECT_URL
              value: 'postgresql://inventory:$(POSTGRES_PASSWORD)@postgres:5432/auth_db?schema=public'
          readinessProbe:
            { httpGet: { path: /health, port: 3001 }, initialDelaySeconds: 10, periodSeconds: 5 }
          livenessProbe:
            { httpGet: { path: /health, port: 3001 }, initialDelaySeconds: 20, periodSeconds: 10 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
---
